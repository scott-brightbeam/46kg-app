services:
  - type: web
    name: 46kg-api
    runtime: node
    plan: starter
    buildCommand: npm install && npm run build
    preDeployCommand: npm run migrate:up --workspace @codex/db && npm run seed:source-precedence --workspace @codex/db && npm run seed:dashboard-users --workspace @codex/api
    startCommand: npm run start --workspace @codex/api
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_TIME_ZONE
        value: Europe/London
      - key: API_PORT
        value: "10000"
      - key: API_BASE_URL
        sync: false
      - key: WEB_BASE_URL
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: 46kg-db
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_WEBHOOK_SECRET
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: TELEGRAM_ALERT_CHAT_ID
        sync: false
      - key: ENABLE_OPERATOR_ALERTS
        value: "true"
      - key: HEALTH_AUTO_EXPORT_SHARED_SECRET
        sync: false
      - key: HEVY_API_KEY
        sync: false
      - key: AUTH_SESSION_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REFRESH_TOKEN
        sync: false
      - key: GOOGLE_CALENDAR_ID
        value: primary
      - key: BACKUP_PGDUMP_BIN
        value: pg_dump
      - key: BACKUP_S3_BUCKET
        sync: false
      - key: BACKUP_S3_REGION
        sync: false
      - key: BACKUP_S3_ENDPOINT
        sync: false
      - key: BACKUP_S3_ACCESS_KEY_ID
        sync: false
      - key: BACKUP_S3_SECRET_ACCESS_KEY
        sync: false
      - key: BACKUP_S3_PREFIX
        value: postgres
      - key: BACKUP_S3_FORCE_PATH_STYLE
        value: "false"
      - key: DASHBOARD_USER_EMAIL
        sync: false
      - key: DASHBOARD_USER_PASSWORD
        sync: false
      - key: DASHBOARD_USER_DISPLAY_NAME
        sync: false
      - key: DASHBOARD_TRAINER_EMAIL
        sync: false
      - key: DASHBOARD_TRAINER_PASSWORD
        sync: false
      - key: DASHBOARD_TRAINER_DISPLAY_NAME
        sync: false
      - key: DASHBOARD_NUTRITIONIST_EMAIL
        sync: false
      - key: DASHBOARD_NUTRITIONIST_PASSWORD
        sync: false
      - key: DASHBOARD_NUTRITIONIST_DISPLAY_NAME
        sync: false

  - type: web
    name: 46kg-web
    runtime: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm run start --workspace @codex/web
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOSTNAME
        value: 0.0.0.0
      - key: NEXT_PUBLIC_API_BASE_URL
        sync: false

